name: Build & Push to DockerHub

on:
    workflow_call:

jobs:
    build-and-push:
        name: publish to DockerHub
        runs-on: ubuntu-latest
        steps:

            # code copy from repo to agent
            - name: checkout code
              uses: actions/checkout@v4
            
            # Login to Docker Hub
            - name: Login to Docker Hub
              uses: docker/login-action@v4
              with:
                username: ${{ vars.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKERHUB_TOKEN }}  # PAT Token with read and write access generated from docker hub

            - name: Testing of Username
              run: |
                echo ${{ vars.DOCKERHUB_USERNAME }}
            
            # Action to push the image to Docker Hub (Building the image is automatically)
            - name: Build & Push to Docker Hub
              uses: docker/build-push-action@v6
              with:
                context: .  # Location for dockerfile
                push: true
                tags: |
                  ${{ vars.DOCKERHUB_USERNAME }}/pythondemoapp:${{ github.sha }}
                  ${{ vars.DOCKERHUB_USERNAME }}/pythondemoapp:${{ github.ref_name }}
                  ${{ vars.DOCKERHUB_USERNAME }}/pythondemoapp:latest

            