# To detects secrets Leaks in API Keys/ sensitive data/ credentails.
# Uses - Gitleaks actions

name: Secrets Scan

on:
    workflow_call:

jobs:
    secret-scan:
        runs-on: ubuntu-latest
        steps:

        # code copy from repo to agent
         - name: code checkout
           uses: actions/checkout@v6
           with:
             fetch-depth: 0     # it means to see the previos commits also if there any leaks
        
        # Action for Git Leaks
         - name: gitleaks 
           uses: gitleaks/gitleaks-action@v3
           env:
              GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # it is generated automatically by github.
              GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }} # Only required for Organizations, not personal accounts.