# To check CVEs in image
# uses Trivy

name: Image Scan

on:
    workflow_call:

jobs:
    image-scan:
        runs-on: ubuntu-latest
        steps:

            # Login to Docker Hub
            - name: Login to Docker Hub
              uses: docker/login-action@v4
              with:
                username: ${{ vars.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKERHUB_TOKEN }}  # PAT Token with read and write access generated from docker hub
              
            # Trivy Image Scanning
            - name: Run Trivy vulnerability scanner
              uses: aquasecurity/trivy-action@v0.36.0
              with:
                image-ref: docker.io/devendragohare16/pythondemoapp:${{ github.sha }}
                exit-code: '1'
                severity: 'CRITICAL'